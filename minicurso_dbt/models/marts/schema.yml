version: 2

models:
  - name: dim_cultura
    description: Dimensão de culturas agrícolas, com unidade e fator de conversão de produtividade.
    columns:
      - name: id_cultura
        description: Identificador da cultura (chave natural, reaproveitada como SK).
        tests:
          - unique
          - not_null
      - name: nome
        tests:
          - not_null
      - name: unidade_produtividade
        description: Unidade de medida de produtividade (sc/ha, @/ha, bu/ha, kg/ha).
        tests:
          - not_null
          - accepted_values:
              values: ['sc/ha', '@/ha', 'bu/ha', 'kg/ha']
      - name: fator_conversao_kg
        description: Fator de conversão de kg para a unidade padrão da cultura.
        tests:
          - not_null

  - name: dim_fazenda
    description: Dimensão de fazendas.
    columns:
      - name: id_fazenda
        tests:
          - unique
          - not_null
      - name: nome
        tests:
          - not_null
      - name: area_total_ha
        tests:
          - not_null

  - name: dim_safra
    description: Dimensão de safras (períodos de produção).
    columns:
      - name: id_safra
        tests:
          - unique
          - not_null
      - name: nome
        tests:
          - not_null

  - name: dim_variedade
    description: Dimensão de variedades (cultivares) de cada cultura.
    columns:
      - name: id_variedade
        tests:
          - unique
          - not_null
      - name: id_cultura
        tests:
          - not_null
          - relationships:
              to: ref('dim_cultura')
              field: id_cultura
      - name: ciclo_dias
        tests:
          - not_null

  - name: dim_talhao
    description: Dimensão de talhões, desnormalizada com atributos da fazenda.
    columns:
      - name: id_talhao
        tests:
          - unique
          - not_null
      - name: id_fazenda
        tests:
          - not_null
          - relationships:
              to: ref('dim_fazenda')
              field: id_fazenda
      - name: nome_talhao
        description: Identificador do talhão extraído do campo codigo de origem.

  - name: dim_plantio
    description: Dimensão de eventos de plantio — grão 1 linha/plantio, carrega datas, áreas e status.
    columns:
      - name: id_plantio
        tests:
          - unique
          - not_null
      - name: id_talhao
        tests:
          - not_null
          - relationships:
              to: ref('dim_talhao')
              field: id_talhao
      - name: id_variedade
        tests:
          - not_null
          - relationships:
              to: ref('dim_variedade')
              field: id_variedade
      - name: id_cultura
        tests:
          - not_null
          - relationships:
              to: ref('dim_cultura')
              field: id_cultura
      - name: id_safra
        tests:
          - not_null
          - relationships:
              to: ref('dim_safra')
              field: id_safra
      - name: status_cronograma
        tests:
          - not_null
          - accepted_values:
              values: ['colhido', 'em_andamento']

  - name: dim_colheita
    description: Dimensão de eventos de colheita — grão 1 linha/colheita, carrega quantidade, área e produtividade já convertida.
    columns:
      - name: id_colheita
        tests:
          - unique
          - not_null
      - name: id_talhao
        tests:
          - not_null
          - relationships:
              to: ref('dim_talhao')
              field: id_talhao
      - name: id_variedade
        tests:
          - not_null
          - relationships:
              to: ref('dim_variedade')
              field: id_variedade
      - name: id_cultura
        tests:
          - not_null
          - relationships:
              to: ref('dim_cultura')
              field: id_cultura
      - name: id_safra
        tests:
          - not_null
          - relationships:
              to: ref('dim_safra')
              field: id_safra
      - name: unidade_produtividade
        tests:
          - accepted_values:
              values: ['sc/ha', '@/ha', 'bu/ha', 'kg/ha']

  - name: fact_cronograma
    description: Fato factless — grão 1 linha/plantio. Liga plantio a talhão, variedade, cultura e safra.
    columns:
      - name: id_plantio
        description: Grão da fato — 1 linha por plantio.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_plantio')
              field: id_plantio
      - name: id_talhao
        tests:
          - not_null
          - relationships:
              to: ref('dim_talhao')
              field: id_talhao
      - name: id_variedade
        tests:
          - not_null
          - relationships:
              to: ref('dim_variedade')
              field: id_variedade
      - name: id_cultura
        tests:
          - not_null
          - relationships:
              to: ref('dim_cultura')
              field: id_cultura
      - name: id_safra
        tests:
          - not_null
          - relationships:
              to: ref('dim_safra')
              field: id_safra

  - name: fact_produtividade
    description: Fato factless — grão 1 linha/colheita. Liga colheita a talhão, variedade, cultura e safra.
    columns:
      - name: id_colheita
        description: Grão da fato — 1 linha por colheita.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_colheita')
              field: id_colheita
      - name: id_talhao
        tests:
          - not_null
          - relationships:
              to: ref('dim_talhao')
              field: id_talhao
      - name: id_variedade
        tests:
          - not_null
          - relationships:
              to: ref('dim_variedade')
              field: id_variedade
      - name: id_cultura
        tests:
          - not_null
          - relationships:
              to: ref('dim_cultura')
              field: id_cultura
      - name: id_safra
        tests:
          - not_null
          - relationships:
              to: ref('dim_safra')
              field: id_safra